services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgweb:
    image: sosedoff/pgweb:0.16.2
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      - postgres

  redis:
    image: redis:8
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:2.70
    restart: unless-stopped
    depends_on:
      - redis

  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10

  identity-api:
    image: ${DOCKERHUB_NAMESPACE}/firefly-signal-identity-api:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__FireflySignalDb: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      UserDocumentStorage__BucketName: ${IDENTITY_S3_BUCKET_NAME}
      UserDocumentStorage__Region: ${IDENTITY_S3_REGION}
      UserDocumentStorage__KeyPrefix: ${IDENTITY_S3_KEY_PREFIX}
      UserDocumentStorage__AccessKeyId: ${IDENTITY_S3_ACCESS_KEY_ID}
      UserDocumentStorage__SecretAccessKey: ${IDENTITY_S3_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  job-search-api:
    image: ${DOCKERHUB_NAMESPACE}/firefly-signal-job-search-api:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__FireflySignalDb: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ai-api:
    image: ${DOCKERHUB_NAMESPACE}/firefly-signal-ai-api:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS}
    depends_on:
      rabbitmq:
        condition: service_healthy

  gateway-api:
    image: ${DOCKERHUB_NAMESPACE}/firefly-signal-gateway-api:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "21000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN}
      Downstream__IdentityApiBaseUrl: http://identity-api:8080
      Downstream__JobSearchApiBaseUrl: http://job-search-api:8080
      Downstream__AiApiBaseUrl: http://ai-api:8080
    depends_on:
      - identity-api
      - job-search-api
      - ai-api

volumes:
  postgres-data:
