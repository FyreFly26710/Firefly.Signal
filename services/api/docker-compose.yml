services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-firefly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firefly}
      POSTGRES_DB: ${POSTGRES_DB:-firefly_signal}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-firefly} -d ${POSTGRES_DB:-firefly_signal}"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgweb:
    image: sosedoff/pgweb:0.16.2
    environment:
      DATABASE_URL: ${PGWEB_DATABASE_URL:-postgres://firefly:firefly@postgres:5432/firefly_signal?sslmode=disable}
    ports:
      - "5050:8081"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  redisinsight:
    image: redis/redisinsight:2.70
    ports:
      - "5540:5540"
    depends_on:
      - redis

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  postgres-data:
