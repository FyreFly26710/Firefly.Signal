services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-firefly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-firefly}
      POSTGRES_DB: ${POSTGRES_DB:-firefly_signal}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-firefly} -d ${POSTGRES_DB:-firefly_signal}"]
      interval: 10s
      timeout: 5s
      retries: 10

  pgweb:
    image: sosedoff/pgweb:0.16.2
    environment:
      DATABASE_URL: ${PGWEB_DATABASE_URL:-postgres://firefly:firefly@postgres:5432/firefly_signal?sslmode=disable}
    ports:
      - "5050:8081"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  redisinsight:
    image: redis/redisinsight:2.70
    ports:
      - "5540:5540"
    depends_on:
      - redis

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10

  identity-api:
    build:
      context: .
      dockerfile: src/Firefly.Signal.Identity.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__FireflySignalDb: Host=postgres;Port=5432;Database=${POSTGRES_DB:-firefly_signal};Username=${POSTGRES_USER:-firefly};Password=${POSTGRES_PASSWORD:-firefly}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-firefly-signal-dev-signing-key-please-change}
    ports:
      - "5081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  job-search-api:
    build:
      context: .
      dockerfile: src/Firefly.Signal.JobSearch.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__FireflySignalDb: Host=postgres;Port=5432;Database=${POSTGRES_DB:-firefly_signal};Username=${POSTGRES_USER:-firefly};Password=${POSTGRES_PASSWORD:-firefly}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ai-api:
    build:
      context: .
      dockerfile: src/Firefly.Signal.Ai.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5083:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy

  gateway-api:
    build:
      context: .
      dockerfile: src/Firefly.Signal.Gateway.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      Downstream__IdentityApiBaseUrl: http://identity-api:8080
      Downstream__JobSearchApiBaseUrl: http://job-search-api:8080
      Downstream__AiApiBaseUrl: http://ai-api:8080
    ports:
      - "5080:8080"
    depends_on:
      identity-api:
        condition: service_started
      job-search-api:
        condition: service_started
      ai-api:
        condition: service_started

volumes:
  postgres-data:
