name: CD API

on:
  push:
    branches:
      - main
    paths:
      - "services/api/**"
      - "infra/docker/**"
      - "infra/deploy/**"
      - ".github/workflows/cd-api.yml"

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      docker_ready: ${{ steps.docker.outputs.ready }}
    steps:
      - name: Check Docker Hub secrets
        id: docker
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_NAMESPACE" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: preflight
    if: needs.preflight.outputs.docker_ready == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway-api
            image: firefly-signal-gateway-api
            dockerfile: infra/docker/Firefly.Signal.Gateway.Api.Dockerfile
          - service: identity-api
            image: firefly-signal-identity-api
            dockerfile: infra/docker/Firefly.Signal.Identity.Api.Dockerfile
          - service: job-search-api
            image: firefly-signal-job-search-api
            dockerfile: infra/docker/Firefly.Signal.JobSearch.Api.Dockerfile
          - service: ai-api
            image: firefly-signal-ai-api
            dockerfile: infra/docker/Firefly.Signal.Ai.Api.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_NAMESPACE }}/${{ matrix.image }}:main
