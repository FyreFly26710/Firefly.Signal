name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: |
          target=$(find . -name '*.slnx' | head -n 1)
          if [ -z "$target" ]; then
            target=$(find . -name '*.sln' | head -n 1)
          fi
          if [ -z "$target" ]; then
            target=$(find . -name '*.csproj' | head -n 1)
          fi
          dotnet restore "$target"
        working-directory: services/api

      - name: Build
        run: |
          target=$(find . -name '*.slnx' | head -n 1)
          if [ -z "$target" ]; then
            target=$(find . -name '*.sln' | head -n 1)
          fi
          if [ -z "$target" ]; then
            target=$(find . -name '*.csproj' | head -n 1)
          fi
          dotnet build "$target" --no-restore
        working-directory: services/api

      - name: Test
        run: |
          target=$(find . -name '*.slnx' | head -n 1)
          if [ -z "$target" ]; then
            target=$(find . -name '*.sln' | head -n 1)
          fi
          if [ -z "$target" ]; then
            target=$(find . -name '*Tests.csproj' | head -n 1)
          fi
          if [ -n "$target" ]; then
            dotnet test "$target" --no-build --verbosity normal
          else
            echo "No test project found; skipping."
          fi
        working-directory: services/api
